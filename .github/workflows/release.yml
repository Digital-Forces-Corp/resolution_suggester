name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # needed for softprops/action-gh-release to create releases

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-dotnet@3e891b0cb619bf60e2c25674b222b8940e2c1c25 # v4
        with:
          dotnet-version: '8.0.x'

      - name: Test
        run: dotnet run --project tests/ResolutionSuggesterTests.csproj -c Release

      - name: Publish
        run: dotnet publish src/resolution_suggester.csproj -c Release -o publish

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c062e08bd532815e2082a1c180f2aa45f82c0b72 # v2
        with:
          files: publish/resolution_suggester.exe
          generate_release_notes: true

      - name: Submit to winget
        uses: vedantmgoyal9/winget-releaser@a507e50fd7dd7c27a3770a07e1bab6c1aa2e3dfa # v2
        with:
          identifier: DigitalForcesCorp.ResolutionSuggester
          version: ${{ steps.version.outputs.version }}
          installers-regex: '\.exe$'
          token: ${{ secrets.WINGET_TOKEN }}
